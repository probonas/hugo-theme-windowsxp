baseURL = 'https://probonas.github.io/hugo-theme-windowsxp/'
languageCode = 'en-us'
title = 'My XP Website'
theme = 'hugo-theme-windowsxp'

enableRobotsTXT = true

[params]
name = 'John Doe'
bio = 'A software developer from the Internet'
description = 'Personal website of John Doe'
avatar = '/icons/xp/Rover.png'
favicon = 'favicon.ico'

# Social links (optional)
github = 'johndoe'
linkedin = 'johndoe'

# Resume link (optional — adds desktop icon + start menu entry)
# resumeURL = '/resume.pdf'

# Sections whose pages appear as scattered files on the desktop
mainSections = ['blog']

# XP-specific settings (all optional — sensible defaults apply)
# [params.xp]
# wallpaper = '/bliss.jpg'       # custom wallpaper image
# homeWindow = '/about/'         # page loaded in the homepage window
# homeWindowTitle = 'About Me'   # title for that window
# homeWindowIcon = 'SystemProperties'  # icon for that window

[menu]

[[menu.main]]
identifier = 'about'
name = 'About'
url = '/about/'
weight = 10
[menu.main.params]
icon = 'UserAccounts'
windowTitle = 'About Me'

[[menu.main]]
identifier = 'blog'
name = 'Blog'
url = '/blog/'
weight = 20
[menu.main.params]
icon = 'MyDocuments'
windowTitle = 'My Documents'

[[menu.main]]
identifier = 'projects'
name = 'Projects'
url = '/projects/'
weight = 30
[menu.main.params]
icon = 'MyComputer'
windowTitle = 'My Computer'
xpLayout = 'icons'

[taxonomies]
category = 'categories'
tag = 'tags'
